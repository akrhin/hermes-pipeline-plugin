# Pipeline Plugin Config v3.8.2
# Все агенты на delegate через polza/deepseek-v4-flash.
# Приоритет: agents > defaults > BUILTIN_MODEL_MAP (models.py)

pipeline:
  models:
    defaults:
      delegate:
        model: deepseek-v4-flash

  ensemble:
    enabled: true
    default_n: 5
    max_n: 10
    agents:
      coder:
        enabled: true
        n: 5
        judge_mode: llm
    judge:
      model: deepseek-v4-flash
      provider: polza
    cost_optimization:
      disable_on_round_gt: 1

  # ── Retrospective (v3.2.0) ──
  retro:
    enabled: true
    dir: "~/.hermes/plugins/pipeline/retro"
    max_files: 100
    auto_analyze: false
