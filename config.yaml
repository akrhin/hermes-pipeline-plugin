# Pipeline Plugin Config v3.2.0
# Flash по умолчанию, security на Pro-делегации.
# Приоритет: agents > defaults > BUILTIN_MODEL_MAP (models.py)

pipeline:
  models:
    defaults:
      delegate:
        provider: direct
        model: deepseek-v4-flash
      delegate_free:
        provider: direct
        model: deepseek-v4-flash
    agents:
      security:
        provider: delegate
        model: deepseek-v4-pro

  ensemble:
    enabled: true
    default_n: 5
    max_n: 10
    agents:
      coder:
        enabled: true
        n: 5
        judge_mode: llm
    judge:
      model: deepseek-v4-flash
      provider: polza
    cost_optimization:
      disable_on_round_gt: 1

  # ── Retrospective (v3.2.0) ──
  retro:
    enabled: true                # вкл/выкл запись JSONL-лога
    dir: "~/.hermes/plugins/pipeline/retro"
    max_files: 100               # автоочистка старых логов
    auto_analyze: false          # автоанализ выключен — копим данные для саморефлексии
