name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install pytest ruff bandit --quiet

      - name: Lint (ruff)
        run: ruff check .

      - name: SAST (bandit)
        run: bandit -r . -ll -q

      - name: Compile check
        run: python -m compileall .

      - name: Run unit tests
        run: python -m pytest -q -v
